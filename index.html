<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>pigeon font maker</title>
    <!-- Пиксельные шрифты -->
    <link href="https://fonts.googleapis.com/css?family=Press+Start+2P|VT323&display=swap" rel="stylesheet">
    <!-- JSZip и FileSaver -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        body {
            background: #3a6ea5; /* более мягкий синий фон */
            font-family: 'VT323', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 12px;
        }
        .pixel-container {
            max-width: 1500px;
            width: 100%;
            background: #c0c0c0;
            border: 4px solid #404040;
            box-shadow: 8px 8px 0 #202020;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .pixel-header {
            background: #2d2d2d;
            color: #e0e0e0;
            padding: 16px 20px;
            border: 2px solid #606060;
            font-family: 'Press Start 2P', cursive;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        .header-text h1 {
            font-size: clamp(18px, 4vw, 24px);
            color: #ffd966;
            letter-spacing: 1px;
        }
        .header-text p {
            font-family: 'VT323', monospace;
            font-size: clamp(16px, 3vw, 20px);
            color: #9fe2bf;
            margin-top: 4px;
        }
        .mobile-menu-toggle {
            background: #c0c0c0;
            border: 2px solid #808080;
            width: 48px;
            height: 48px;
            font-size: 28px;
            cursor: pointer;
            box-shadow: -2px -2px 0 #404040, 2px 2px 0 #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: 0.1s;
        }
        .mobile-menu-toggle:active {
            box-shadow: inset -2px -2px 0 #404040, inset 2px 2px 0 #e0e0e0;
            transform: translate(2px, 2px);
        }
        .pixel-main {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }
        /* Левая панель — улучшенная группировка */
        .pixel-sidebar {
            width: 340px;
            background: #a0a0a0;
            border: 3px solid #606060;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            transition: transform 0.3s ease;
        }
        /* Блоки с четкими заголовками */
        .pixel-card {
            background: #c2c2c2;
            border: 2px solid #707070;
            padding: 14px;
            box-shadow: inset -1px -1px 0 #404040, inset 1px 1px 0 #e0e0e0;
        }
        .pixel-card h3 {
            font-family: 'Press Start 2P', cursive;
            font-size: 12px;
            margin-bottom: 14px;
            color: #202020;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 2px solid #808080;
            padding-bottom: 6px;
        }
        .pixel-card h3 span {
            font-size: 18px;
        }
        .pixel-input, .pixel-select {
            background: #b0b0b0;
            border: 2px solid #606060;
            padding: 10px;
            font-family: 'VT323', monospace;
            font-size: 18px;
            color: #202020;
            width: 100%;
            box-shadow: inset -2px -2px 0 #404040, inset 2px 2px 0 #e0e0e0;
        }
        .pixel-input:focus, .pixel-select:focus {
            outline: none;
            background: #c0c0c0;
            border-color: #ffcc00;
        }
        .pixel-button {
            background: #d0d0d0;
            border: 2px solid #808080;
            padding: 12px 18px;
            font-family: 'Press Start 2P', cursive;
            font-size: 12px;
            color: #202020;
            cursor: pointer;
            box-shadow: -2px -2px 0 #404040, 2px 2px 0 #e0e0e0;
            transition: 0.08s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            min-height: 44px;
        }
        .pixel-button:hover {
            background: #e0e0e0;
            transform: translate(-1px, -1px);
            box-shadow: -3px -3px 0 #404040, 3px 3px 0 #e0e0e0;
        }
        .pixel-button:active {
            box-shadow: inset -2px -2px 0 #404040, inset 2px 2px 0 #e0e0e0;
            transform: translate(2px, 2px);
        }
        .pixel-button.primary {
            background: #8ab8ff;
            border-color: #4060c0;
        }
        .pixel-button.danger {
            background: #ffa07a;
            border-color: #c04040;
        }
        /* Компактный список символов */
        .char-list {
            max-height: 180px;
            overflow-y: auto;
            background: #a0a0a0;
            border: 2px solid #606060;
            box-shadow: inset -2px -2px 0 #404040, inset 2px 2px 0 #e0e0e0;
            margin: 8px 0;
        }
        .char-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            border-bottom: 1px solid #808080;
            cursor: pointer;
            font-size: 22px;
            transition: background 0.1s;
        }
        .char-item.selected {
            background: #ffe570;
            font-weight: bold;
        }
        .char-item:hover {
            background: #d0d0d0;
        }
        .char-badge {
            background: #404040;
            color: #e0e0e0;
            padding: 4px 10px;
            font-size: 14px;
            border-radius: 0;
        }
        /* Правая панель */
        .pixel-canvas-area {
            flex: 1;
            min-width: 350px;
            background: #a0a0a0;
            border: 3px solid #606060;
            padding: 16px;
            display: flex;
            flex-direction: column;
        }
        .canvas-wrapper {
            width: 100%;
            height: 400px;
            overflow: auto;
            border: 3px solid #505050;
            background: #808080;
            box-shadow: inset -2px -2px 0 #404040, inset 2px 2px 0 #c0c0c0;
            cursor: default;
        }
        .canvas-wrapper.panning {
            cursor: grabbing;
        }
        #imageCanvas {
            display: block;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
        }
        .zoom-bar {
            display: flex;
            gap: 8px;
            margin: 12px 0 8px;
            flex-wrap: wrap;
        }
        .zoom-bar button {
            width: 48px;
            height: 48px;
            font-size: 24px;
            padding: 0;
        }
        .zoom-bar span {
            font-size: 20px;
            background: #b0b0b0;
            padding: 8px 16px;
            border: 2px solid #606060;
            box-shadow: inset -1px -1px 0 #404040, inset 1px 1px 0 #e0e0e0;
        }
        /* Панель предпросмотра улучшенная */
        .preview-panel {
            background: #b8b8b8;
            border: 2px solid #707070;
            padding: 16px;
            box-shadow: inset -2px -2px 0 #404040, inset 2px 2px 0 #e0e0e0;
            margin-top: 16px;
        }
        .preview-panel h3 {
            font-family: 'Press Start 2P', cursive;
            font-size: 12px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .preview-row {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            align-items: flex-end;
        }
        .preview-cell {
            text-align: center;
            background: #a0a0a0;
            padding: 8px;
            border: 2px solid #606060;
        }
        .preview-cell canvas {
            background: #909090;
            border: 1px solid #404040;
        }
        .preview-label {
            font-size: 16px;
            margin-top: 6px;
            color: #202020;
        }
        .text-preview {
            background: #a0a0a0;
            border: 2px solid #606060;
            padding: 10px;
            font-family: 'VT323', monospace;
            font-size: 28px;
            white-space: nowrap;
            overflow-x: auto;
            box-shadow: inset -2px -2px 0 #404040, inset 2px 2px 0 #e0e0e0;
        }
        /* Тосты */
        .toast {
            position: fixed;
            top: 24px;
            right: 24px;
            background: #2d2d2d;
            color: #ffd966;
            border: 2px solid #a0a0a0;
            padding: 14px 24px;
            font-family: 'VT323', monospace;
            font-size: 20px;
            box-shadow: 6px 6px 0 #202020;
            z-index: 10000;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
        }
        /* Мобильное меню */
        @media (max-width: 800px) {
            .pixel-sidebar {
                position: fixed;
                top: 0;
                left: 0;
                height: 100vh;
                width: 300px;
                z-index: 1000;
                transform: translateX(-100%);
                overflow-y: auto;
                background: #a0a0a0;
                border-right: 3px solid #404040;
            }
            .pixel-sidebar.open {
                transform: translateX(0);
            }
            body.menu-open::after {
                content: '';
                position: fixed;
                top: 0; left: 0; right: 0; bottom: 0;
                background: rgba(0,0,0,0.5);
                z-index: 999;
            }
        }
    </style>
</head>
<body>
    <div class="pixel-container">
        <div class="pixel-header">
            <div class="header-text">
                <h1>🐦 PIGEON FONT MAKER</h1>
                <p>пиксели → шрифт</p>
            </div>
            <div class="mobile-menu-toggle" id="menuToggle">☰</div>
        </div>

        <div class="pixel-main">
            <!-- Левая панель (управление) -->
            <div class="pixel-sidebar" id="sidebar">
                <!-- Блок загрузки -->
                <div class="pixel-card">
                    <h3><span>📁</span> 1. Загрузить спрайт</h3>
                    <input type="file" id="imageUpload" accept="image/png, image/bmp, image/gif, image/jpeg" class="pixel-input">
                    <p style="margin-top:6px; font-size:16px;">PNG, BMP, GIF (прозрачность)</p>
                </div>

                <!-- Блок символов -->
                <div class="pixel-card">
                    <h3><span>🔤</span> 2. Символы</h3>
                    <div style="display: flex; gap: 8px;">
                        <input type="text" id="charInput" maxlength="1" placeholder="A" class="pixel-input">
                        <button class="pixel-button" id="addCharBtn" data-tooltip="Добавить">➕</button>
                    </div>
                    <div class="char-list" id="charList"></div>
                    <p style="font-size:13px; margin-top:5px;">⬇️ кликните символ, затем выделите на холсте</p>
                </div>

                <!-- Блок настроек (объединён) -->
                <div class="pixel-card">
                    <h3><span>⚙️</span> 3. Настройки</h3>
                    <label>🌓 Порог яркости:</label>
                    <input type="range" id="thresholdSlider" min="0" max="255" value="128" style="width:100%;">
                    <div style="display: flex; justify-content: space-between; margin-bottom:10px;">
                        <span>0</span><span id="thresholdValue">128</span><span>255</span>
                    </div>
                    <label>🧹 Удаление шумов (turdsize):</label>
                    <input type="number" id="turdsize" min="0" max="20" value="2" class="pixel-input">
                    <label>📏 Моноширинный:</label>
                    <select id="monospaced" class="pixel-select">
                        <option value="auto">Авто (по ширине)</option>
                        <option value="fixed">Фиксированная ширина</option>
                    </select>
                    <label>📐 Размер глифа (px):</label>
                    <div style="display: flex; gap: 8px; align-items: center;">
                        <input type="number" id="outWidth" value="64" min="8" class="pixel-input" style="flex:1;">
                        <span style="font-size:22px;">x</span>
                        <input type="number" id="outHeight" value="64" min="8" class="pixel-input" style="flex:1;">
                    </div>
                    <button class="pixel-button" id="setSizeBtn" style="width:100%; margin-top:8px;">Применить размер</button>
                </div>

                <!-- Блок экспорта -->
                <div class="pixel-card">
                    <h3><span>💾</span> 4. Экспорт</h3>
                    <label>🏷️ Имя шрифта:</label>
                    <input type="text" id="fontName" value="PixelFont" class="pixel-input">
                    <div style="display: flex; gap: 8px; margin: 12px 0;">
                        <button class="pixel-button primary" id="exportTtfBtn" style="flex:2;">✨ TTF</button>
                        <button class="pixel-button" id="saveConfigBtn" data-tooltip="Сохранить JSON">💾</button>
                        <button class="pixel-button" id="loadConfigBtn" data-tooltip="Загрузить JSON">📂</button>
                    </div>
                    <button class="pixel-button danger" id="clearAllBtn">🗑 Очистить всё</button>
                </div>

                <!-- Статистика -->
                <div class="pixel-card" id="infoPanel" style="font-size:18px;">
                    Загрузите изображение
                </div>
            </div>

            <!-- Правая панель (холст и предпросмотр) -->
            <div class="pixel-canvas-area">
                <div class="canvas-wrapper" id="canvasWrapper">
                    <canvas id="imageCanvas"></canvas>
                </div>

                <div class="zoom-bar">
                    <button class="pixel-button" id="zoomInBtn">+</button>
                    <button class="pixel-button" id="zoomOutBtn">-</button>
                    <button class="pixel-button" id="resetZoomBtn">⟲</button>
                    <span id="zoomPercent">100%</span>
                </div>

                <!-- Улучшенный предпросмотр -->
                <div class="preview-panel">
                    <h3><span>🔍</span> ПРЕДПРОСМОТР (выбранный символ)</h3>
                    <div class="preview-row">
                        <div class="preview-cell">
                            <div id="previewPixel"></div>
                            <div class="preview-label">пиксели 8x</div>
                        </div>
                        <div class="preview-cell">
                            <canvas id="previewGlyph" width="64" height="64" style="width:64px; height:64px;"></canvas>
                            <div class="preview-label">в окне 64x64</div>
                        </div>
                    </div>
                    <div style="margin-top:12px;">
                        <label>🔡 Тестовая строка:</label>
                        <input type="text" id="previewText" value="ABC 123" class="pixel-input" style="margin:6px 0;">
                        <div id="textPreviewCanvas" class="text-preview"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        (function() {
            const canvas = document.getElementById('imageCanvas');
            const ctx = canvas.getContext('2d');
            const wrapper = document.getElementById('canvasWrapper');
            const toastEl = document.getElementById('toast');

            let originalImage = null;
            let imageLoaded = false;
            let zoom = 1.0;
            let charRects = {};
            let selectedChar = null;
            let outputSize = { w: 64, h: 64 };
            let isDrawing = false;
            let startX = 0, startY = 0;
            let currentRect = null;
            let isPanning = false;
            let panStartX = 0, panStartY = 0;
            let scrollStartLeft = 0, scrollStartTop = 0;
            let spacePressed = false;
            let redrawScheduled = false;

            const thresholdSlider = document.getElementById('thresholdSlider');
            const thresholdValue = document.getElementById('thresholdValue');
            const turdsizeInput = document.getElementById('turdsize');
            const monospacedSelect = document.getElementById('monospaced');
            const fontNameInput = document.getElementById('fontName');
            const outWidthInput = document.getElementById('outWidth');
            const outHeightInput = document.getElementById('outHeight');
            const previewTextInput = document.getElementById('previewText');

            function showToast(msg, duration=3000) {
                toastEl.textContent = msg;
                toastEl.classList.add('show');
                setTimeout(() => toastEl.classList.remove('show'), duration);
            }

            // Сохранение в localStorage
            function saveToLocalStorage() {
                try {
                    const state = {
                        image: originalImage ? originalImage.src : null,
                        charRects, outputSize, selectedChar,
                        threshold: thresholdSlider.value,
                        turdsize: turdsizeInput.value,
                        monospaced: monospacedSelect.value,
                        fontName: fontNameInput.value,
                        previewText: previewTextInput.value,
                        zoom
                    };
                    localStorage.setItem('pigeonFontMaker', JSON.stringify(state));
                } catch (e) {}
            }

            function loadFromLocalStorage() {
                const saved = localStorage.getItem('pigeonFontMaker');
                if (!saved) return false;
                try {
                    const state = JSON.parse(saved);
                    if (state.image) {
                        const img = new Image();
                        img.onload = () => {
                            originalImage = img;
                            imageLoaded = true;
                            charRects = state.charRects || {};
                            outputSize = state.outputSize || { w:64, h:64 };
                            selectedChar = state.selectedChar || null;
                            thresholdSlider.value = state.threshold || 128;
                            turdsizeInput.value = state.turdsize || 2;
                            monospacedSelect.value = state.monospaced || 'auto';
                            fontNameInput.value = state.fontName || 'PixelFont';
                            previewTextInput.value = state.previewText || 'ABC 123';
                            zoom = state.zoom || 1.0;

                            outWidthInput.value = outputSize.w;
                            outHeightInput.value = outputSize.h;
                            thresholdValue.textContent = thresholdSlider.value;

                            resizeCanvas();
                            renderCharList();
                            updateInfo();
                            updatePreviews();
                            updateTextPreview();
                            scheduleRedraw();
                            showToast('✅ Состояние восстановлено');
                        };
                        img.src = state.image;
                        return true;
                    }
                } catch (e) {}
                return false;
            }

            function clearLocalStorage() {
                localStorage.removeItem('pigeonFontMaker');
            }

            function scheduleRedraw() {
                if (!redrawScheduled) {
                    redrawScheduled = true;
                    requestAnimationFrame(() => {
                        redrawCanvas();
                        redrawScheduled = false;
                    });
                }
            }

            function resizeCanvas() {
                if (!originalImage) return;
                canvas.width = originalImage.width * zoom;
                canvas.height = originalImage.height * zoom;
                scheduleRedraw();
            }

            function redrawCanvas() {
                if (!originalImage || !imageLoaded) return;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.imageSmoothingEnabled = false;
                ctx.drawImage(originalImage, 0, 0, canvas.width, canvas.height);

                ctx.strokeStyle = '#ff4444';
                ctx.lineWidth = 2;
                ctx.font = 'bold 14px "VT323", monospace';
                ctx.fillStyle = '#ff4444';

                for (const [ch, rect] of Object.entries(charRects)) {
                    if (!rect) continue;
                    const x = rect.x * zoom;
                    const y = rect.y * zoom;
                    const w = rect.width * zoom;
                    const h = rect.height * zoom;
                    ctx.strokeRect(x, y, w, h);
                    ctx.fillText(ch, x + 4, y + 20);
                }

                if (isDrawing && currentRect) {
                    ctx.strokeStyle = '#00aaff';
                    ctx.lineWidth = 2;
                    ctx.setLineDash([6, 4]);
                    ctx.strokeRect(currentRect.x, currentRect.y, currentRect.w, currentRect.h);
                    ctx.setLineDash([]);
                }
            }

            function getEventCoords(e) {
                const rect = canvas.getBoundingClientRect();
                const scrollLeft = wrapper.scrollLeft;
                const scrollTop = wrapper.scrollTop;
                let clientX, clientY;
                if (e.touches) {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }
                const mouseCanvasX = clientX - rect.left + scrollLeft;
                const mouseCanvasY = clientY - rect.top + scrollTop;
                const imgX = mouseCanvasX / zoom;
                const imgY = mouseCanvasY / zoom;
                return { imgX, imgY, canvasX: mouseCanvasX, canvasY: mouseCanvasY };
            }

            function handlePointerDown(e) {
                if (!imageLoaded) return;
                e.preventDefault();

                if (spacePressed || e.button === 1) {
                    isPanning = true;
                    wrapper.classList.add('panning');
                    const { canvasX, canvasY } = getEventCoords(e);
                    panStartX = canvasX;
                    panStartY = canvasY;
                    scrollStartLeft = wrapper.scrollLeft;
                    scrollStartTop = wrapper.scrollTop;
                    return;
                }

                if (e.button === 0 && selectedChar) {
                    const { imgX, imgY, canvasX, canvasY } = getEventCoords(e);
                    isDrawing = true;
                    startX = Math.round(imgX);
                    startY = Math.round(imgY);
                    currentRect = { x: canvasX, y: canvasY, w: 0, h: 0 };
                }
            }

            function handlePointerMove(e) {
                if (!imageLoaded) return;
                e.preventDefault();

                if (isPanning) {
                    const { canvasX, canvasY } = getEventCoords(e);
                    const dx = canvasX - panStartX;
                    const dy = canvasY - panStartY;
                    wrapper.scrollLeft = scrollStartLeft - dx;
                    wrapper.scrollTop = scrollStartTop - dy;
                    return;
                }

                if (!isDrawing || !selectedChar) return;
                const { imgX, imgY } = getEventCoords(e);
                const currentImgX = Math.round(imgX);
                const currentImgY = Math.round(imgY);
                const canvasStartX = startX * zoom;
                const canvasStartY = startY * zoom;
                const canvasCurrentX = currentImgX * zoom;
                const canvasCurrentY = currentImgY * zoom;
                const x = Math.min(canvasStartX, canvasCurrentX);
                const y = Math.min(canvasStartY, canvasCurrentY);
                const w = Math.abs(canvasCurrentX - canvasStartX);
                const h = Math.abs(canvasCurrentY - canvasStartY);
                currentRect = { x, y, w, h };
                scheduleRedraw();
            }

            function handlePointerUp(e) {
                e.preventDefault();
                if (isPanning) {
                    isPanning = false;
                    wrapper.classList.remove('panning');
                    return;
                }
                if (!isDrawing || !selectedChar) return;
                isDrawing = false;
                const { imgX, imgY } = getEventCoords(e);
                const endX = Math.round(imgX);
                const endY = Math.round(imgY);
                const x1 = Math.min(startX, endX);
                const y1 = Math.min(startY, endY);
                const x2 = Math.max(startX, endX);
                const y2 = Math.max(startY, endY);
                const w = x2 - x1;
                const h = y2 - y1;
                if (w > 1 && h > 1) {
                    charRects[selectedChar] = { x: x1, y: y1, width: w, height: h };
                    renderCharList();
                    updateInfo();
                    updatePreviews();
                    saveToLocalStorage();
                }
                currentRect = null;
                scheduleRedraw();
            }

            canvas.addEventListener('touchstart', handlePointerDown, { passive: false });
            canvas.addEventListener('touchmove', handlePointerMove, { passive: false });
            canvas.addEventListener('touchend', handlePointerUp);
            canvas.addEventListener('touchcancel', handlePointerUp);
            canvas.addEventListener('mousedown', handlePointerDown);
            canvas.addEventListener('mousemove', handlePointerMove);
            canvas.addEventListener('mouseup', handlePointerUp);
            canvas.addEventListener('mouseleave', () => {
                if (isDrawing) { isDrawing = false; currentRect = null; scheduleRedraw(); }
                if (isPanning) { isPanning = false; wrapper.classList.remove('panning'); }
            });

            window.addEventListener('keydown', (e) => {
                if (e.code === 'Space') { spacePressed = true; wrapper.style.cursor = 'grab'; e.preventDefault(); }
            });
            window.addEventListener('keyup', (e) => {
                if (e.code === 'Space') { spacePressed = false; wrapper.style.cursor = 'default'; e.preventDefault(); }
            });

            canvas.addEventListener('wheel', (e) => {
                e.preventDefault();
                const delta = e.deltaY > 0 ? -0.2 : 0.2;
                zoom = Math.max(0.2, Math.min(20, zoom + delta));
                resizeCanvas();
                document.getElementById('zoomPercent').innerText = Math.round(zoom*100)+'%';
                saveToLocalStorage();
            });

            document.getElementById('zoomInBtn').addEventListener('click', () => {
                zoom = Math.min(20, zoom+0.2); resizeCanvas(); document.getElementById('zoomPercent').innerText = Math.round(zoom*100)+'%'; saveToLocalStorage();
            });
            document.getElementById('zoomOutBtn').addEventListener('click', () => {
                zoom = Math.max(0.2, zoom-0.2); resizeCanvas(); document.getElementById('zoomPercent').innerText = Math.round(zoom*100)+'%'; saveToLocalStorage();
            });
            document.getElementById('resetZoomBtn').addEventListener('click', () => {
                zoom = 1.0; resizeCanvas(); document.getElementById('zoomPercent').innerText = '100%'; saveToLocalStorage();
            });

            document.getElementById('imageUpload').addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        originalImage = img;
                        imageLoaded = true;
                        resizeCanvas();
                        updateInfo();
                        updatePreviews();
                        updateTextPreview();
                        saveToLocalStorage();
                        showToast('✅ Изображение загружено');
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            });

            function renderCharList() {
                const container = document.getElementById('charList');
                container.innerHTML = '';
                const sorted = Object.keys(charRects).sort();
                for (let ch of sorted) {
                    const div = document.createElement('div');
                    div.className = 'char-item' + (selectedChar === ch ? ' selected' : '');
                    div.innerHTML = `<span style="font-weight:600;">${ch}</span> <span class="char-badge">${charRects[ch] ? '✓' : '✗'}</span>`;
                    const delBtn = document.createElement('button');
                    delBtn.innerHTML = '✕';
                    delBtn.style.background = 'transparent';
                    delBtn.style.border = 'none';
                    delBtn.style.fontSize = '22px';
                    delBtn.style.cursor = 'pointer';
                    delBtn.style.color = '#800';
                    delBtn.style.padding = '0 6px';
                    delBtn.onclick = (e) => {
                        e.stopPropagation();
                        delete charRects[ch];
                        if (selectedChar === ch) selectedChar = null;
                        renderCharList();
                        scheduleRedraw();
                        updateInfo();
                        updatePreviews();
                        saveToLocalStorage();
                    };
                    div.appendChild(delBtn);
                    div.onclick = () => {
                        selectedChar = ch;
                        renderCharList();
                        updateInfo();
                        updatePreviews();
                        saveToLocalStorage();
                    };
                    container.appendChild(div);
                }
            }

            document.getElementById('addCharBtn').addEventListener('click', () => {
                const inp = document.getElementById('charInput');
                let ch = inp.value.trim();
                if (!ch) return alert('Введите символ');
                ch = ch[0];
                if (charRects.hasOwnProperty(ch)) return alert('Символ уже есть');
                charRects[ch] = null;
                renderCharList();
                selectedChar = ch;
                renderCharList();
                inp.value = '';
                updateInfo();
                updatePreviews();
                saveToLocalStorage();
            });

            thresholdSlider.addEventListener('input', () => {
                thresholdValue.textContent = thresholdSlider.value;
                saveToLocalStorage();
            });

            document.getElementById('setSizeBtn').addEventListener('click', () => {
                const w = parseInt(outWidthInput.value);
                const h = parseInt(outHeightInput.value);
                if (w>0 && h>0) {
                    outputSize = { w, h };
                    document.getElementById('previewGlyph').width = outputSize.w;
                    document.getElementById('previewGlyph').height = outputSize.h;
                    updateInfo();
                    updatePreviews();
                    saveToLocalStorage();
                } else alert('Некорректный размер');
            });

            function updateInfo() {
                const info = document.getElementById('infoPanel');
                info.innerHTML = `<b>📸 Изобр.:</b> ${originalImage ? originalImage.width+'×'+originalImage.height : '—'}<br>
                <b>🔣 Символов:</b> ${Object.keys(charRects).length}<br>
                <b>👉 Выбран:</b> ${selectedChar || '—'}`;
            }

            function updatePreviews() {
                if (!selectedChar || !charRects[selectedChar] || !originalImage) {
                    document.getElementById('previewPixel').innerHTML = '';
                    const gctx = document.getElementById('previewGlyph').getContext('2d');
                    gctx.clearRect(0,0,outputSize.w,outputSize.h);
                    return;
                }
                const rect = charRects[selectedChar];
                const scale = 8;
                const pixelDiv = document.getElementById('previewPixel');
                pixelDiv.innerHTML = '';
                const pixelCanvas = document.createElement('canvas');
                pixelCanvas.width = rect.width * scale;
                pixelCanvas.height = rect.height * scale;
                pixelCanvas.style.width = (rect.width*scale)+'px';
                pixelCanvas.style.height = (rect.height*scale)+'px';
                const pctx = pixelCanvas.getContext('2d');
                pctx.imageSmoothingEnabled = false;
                pctx.drawImage(originalImage, rect.x, rect.y, rect.width, rect.height, 0, 0, rect.width*scale, rect.height*scale);
                // сетка
                pctx.strokeStyle = '#404040';
                pctx.lineWidth = 1;
                for (let i=0; i<=rect.width; i++) {
                    pctx.beginPath(); pctx.moveTo(i*scale,0); pctx.lineTo(i*scale, rect.height*scale); pctx.stroke();
                }
                for (let i=0; i<=rect.height; i++) {
                    pctx.beginPath(); pctx.moveTo(0,i*scale); pctx.lineTo(rect.width*scale, i*scale); pctx.stroke();
                }
                pixelDiv.appendChild(pixelCanvas);

                const glyphCanvas = document.getElementById('previewGlyph');
                glyphCanvas.width = outputSize.w;
                glyphCanvas.height = outputSize.h;
                const gctx = glyphCanvas.getContext('2d');
                gctx.clearRect(0,0,outputSize.w,outputSize.h);
                gctx.imageSmoothingEnabled = false;
                const temp = document.createElement('canvas');
                temp.width = rect.width;
                temp.height = rect.height;
                const tctx = temp.getContext('2d');
                tctx.drawImage(originalImage, rect.x, rect.y, rect.width, rect.height, 0, 0, rect.width, rect.height);
                const pasteX = Math.floor((outputSize.w - rect.width)/2);
                const pasteY = Math.floor((outputSize.h - rect.height)/2);
                gctx.drawImage(temp, pasteX, pasteY);
            }

            function updateTextPreview() {
                const text = previewTextInput.value;
                const container = document.getElementById('textPreviewCanvas');
                container.innerHTML = '';
                const canvas = document.createElement('canvas');
                canvas.width = 800;
                canvas.height = outputSize.h + 20;
                const ctx = canvas.getContext('2d');
                ctx.imageSmoothingEnabled = false;
                ctx.fillStyle = '#a0a0a0';
                ctx.fillRect(0,0,canvas.width,canvas.height);
                let x = 10;
                for (let ch of text) {
                    if (charRects[ch] && originalImage) {
                        const rect = charRects[ch];
                        const temp = document.createElement('canvas');
                        temp.width = rect.width;
                        temp.height = rect.height;
                        const tctx = temp.getContext('2d');
                        tctx.drawImage(originalImage, rect.x, rect.y, rect.width, rect.height, 0, 0, rect.width, rect.height);
                        ctx.drawImage(temp, x, 10);
                        x += rect.width + 2;
                    } else {
                        ctx.fillStyle = '#ff6060';
                        ctx.fillRect(x, 10, 20, 20);
                        ctx.fillStyle = '#a0a0a0';
                        x += 22;
                    }
                    if (x > 780) break;
                }
                container.appendChild(canvas);
            }

            previewTextInput.addEventListener('input', () => { updateTextPreview(); saveToLocalStorage(); });
            turdsizeInput.addEventListener('input', saveToLocalStorage);
            monospacedSelect.addEventListener('change', saveToLocalStorage);
            fontNameInput.addEventListener('input', saveToLocalStorage);

            // Мобильное меню
            const menuToggle = document.getElementById('menuToggle');
            const sidebar = document.getElementById('sidebar');
            const body = document.body;
            menuToggle.addEventListener('click', () => {
                sidebar.classList.toggle('open');
                body.classList.toggle('menu-open');
            });
            body.addEventListener('click', (e) => {
                if (body.classList.contains('menu-open') && !sidebar.contains(e.target) && e.target !== menuToggle) {
                    sidebar.classList.remove('open');
                    body.classList.remove('menu-open');
                }
            });

            document.getElementById('saveConfigBtn').addEventListener('click', () => {
                if (!originalImage) return alert('Нет изображения');
                const config = {
                    image: originalImage.src,
                    outputSize, chars: charRects,
                    threshold: thresholdSlider.value,
                    turdsize: turdsizeInput.value,
                    monospaced: monospacedSelect.value
                };
                saveAs(new Blob([JSON.stringify(config,null,2)], {type:'application/json'}), 'pigeon_font_config.json');
            });

            document.getElementById('loadConfigBtn').addEventListener('click', () => {
                const inp = document.createElement('input');
                inp.type = 'file';
                inp.accept = 'application/json';
                inp.onchange = (e) => {
                    const file = e.target.files[0];
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        try {
                            const config = JSON.parse(event.target.result);
                            if (config.image) {
                                const img = new Image();
                                img.onload = () => {
                                    originalImage = img; imageLoaded = true;
                                    resizeCanvas();
                                    charRects = config.chars || {};
                                    outputSize = config.outputSize || {w:64,h:64};
                                    outWidthInput.value = outputSize.w;
                                    outHeightInput.value = outputSize.h;
                                    document.getElementById('previewGlyph').width = outputSize.w;
                                    document.getElementById('previewGlyph').height = outputSize.h;
                                    if (config.threshold) thresholdSlider.value = config.threshold;
                                    if (config.turdsize) turdsizeInput.value = config.turdsize;
                                    if (config.monospaced) monospacedSelect.value = config.monospaced;
                                    thresholdValue.textContent = thresholdSlider.value;
                                    selectedChar = null;
                                    renderCharList();
                                    scheduleRedraw();
                                    updateInfo();
                                    updatePreviews();
                                    updateTextPreview();
                                    saveToLocalStorage();
                                    showToast('✅ Конфигурация загружена');
                                };
                                img.src = config.image;
                            } else alert('Нет изображения в конфиге');
                        } catch (err) { alert('Ошибка JSON'); }
                    };
                    reader.readAsText(file);
                };
                inp.click();
            });

            document.getElementById('clearAllBtn').addEventListener('click', () => {
                if (confirm('Очистить всё?')) {
                    charRects = {}; selectedChar = null;
                    renderCharList(); scheduleRedraw(); updateInfo(); updatePreviews(); updateTextPreview();
                    clearLocalStorage();
                    showToast('🗑 Всё очищено');
                }
            });

            document.getElementById('exportTtfBtn').addEventListener('click', async () => {
                if (!originalImage || Object.keys(charRects).length===0) return alert('Загрузите изображение и выделите символы');
                const fontname = fontNameInput.value.trim() || 'PixelFont';
                const rectsData = {};
                for (let [ch, rect] of Object.entries(charRects)) if (rect) rectsData[ch] = rect;
                if (Object.keys(rectsData).length===0) return alert('Нет выделенных областей');

                const imageBlob = await fetch(originalImage.src).then(r=>r.blob());
                const formData = new FormData();
                formData.append('sprite', imageBlob, 'sprite.png');
                formData.append('chars', JSON.stringify(Object.keys(rectsData)));
                formData.append('rects', JSON.stringify(rectsData));
                formData.append('fontname', fontname);
                formData.append('threshold', thresholdSlider.value);
                formData.append('turdsize', turdsizeInput.value);
                formData.append('monospaced', monospacedSelect.value);
                formData.append('outWidth', outputSize.w);
                formData.append('outHeight', outputSize.h);

                const btn = document.getElementById('exportTtfBtn');
                const orig = btn.innerText;
                btn.innerText = '⌛ ГЕНЕРАЦИЯ...'; btn.disabled = true;
                try {
                    const resp = await fetch('/convert', { method:'POST', body:formData });
                    if (!resp.ok) throw new Error((await resp.json()).error || 'Ошибка');
                    saveAs(await resp.blob(), fontname+'.ttf');
                    showToast('✅ TTF готов');
                } catch (err) { alert('Ошибка: '+err.message); }
                finally { btn.innerText = orig; btn.disabled = false; }
            });

            renderCharList();
            updateInfo();
            thresholdValue.textContent = thresholdSlider.value;
            document.getElementById('previewGlyph').width = outputSize.w;
            document.getElementById('previewGlyph').height = outputSize.h;
            if (!loadFromLocalStorage()) showToast('👋 Загрузите спрайт', 4000);
        })();
    </script>
</body>
</html>
